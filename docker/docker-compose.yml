services:
  # iReparo app (built from local source so it ships with the iReparo
  # branding and the missed-call WhatsApp fallback. If you prefer the
  # upstream Whatomate image, comment out the `build:` block and
  # change `image:` to `shridh0r/whatomate:latest`).
  app:
    image: ireparo:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ireparo_app
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - ireparo
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads:rw
      - ./config.toml:/app/config.toml:ro
    command: ["server", "-migrate", "-config", "/app/config.toml"]

  # PostgreSQL database
  db:
    image: postgres:17-alpine
    container_name: ireparo_db
    restart: unless-stopped
    networks:
      - ireparo
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ireparo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ireparo}
      POSTGRES_DB: ${POSTGRES_DB:-ireparo}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ireparo} -d ${POSTGRES_DB:-ireparo}"]
      interval: 10s
      timeout: 5s
      retries: 6
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # Redis
  redis:
    image: redis:7-alpine
    container_name: ireparo_redis
    restart: unless-stopped
    networks:
      - ireparo
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis-data:/data

networks:
  ireparo:

volumes:
  postgres-data:
  redis-data:
